- title: "1-LFP: Livestock Forage Disaster Program (Amendment 1)"
  category: documents
  type: FSA HANDBOOK
  byline: Base issuance · Approved September 11, 2019
  description:
    The base issuance of FSA's national policy handbook for LFP, directing state and county offices on eligibility, drought-trigger determinations, and payment procedure for 2019 and subsequent years.
  links:
    - title: Download (PDF)
      url: /docs/1lfp-a1.pdf
    - title: Original source
      url: https://www.fsa.usda.gov/Internet/FSA_File/1-lfp_r00_a01.pdf
  image: /assets/documents/1lfp-a1.png
  image_position: top

- title: "1-LFP: Livestock Forage Disaster Program (Amendment 2)"
  category: documents
  type: FSA HANDBOOK
  byline: Amendment 2 · Approved July 14, 2020
  description:
    The 2020 program-year update — sets 2020 payment rates, adds acreage-tolerance policy, and requires an FSA-578 acreage report on file before an LFP application.
  links:
    - title: Download (PDF)
      url: /docs/1lfp-a2.pdf
    - title: Original source
      url: https://www.fsa.usda.gov/Internet/FSA_File/1-lfp_r00_a02.pdf
  image: /assets/documents/1lfp-a2.png
  image_position: top

- title: "1-LFP: Livestock Forage Disaster Program (Amendment 3)"
  category: documents
  type: FSA HANDBOOK
  byline: Amendment 3 · Approved May 3, 2021
  description:
    The 2021 program-year update, setting 2021 payment rates and clarifying which irrigated grazing acreage qualifies for LFP.
  links:
    - title: Download (PDF)
      url: /docs/1lfp-a3.pdf
    - title: Original source
      url: https://www.fsa.usda.gov/Internet/FSA_File/1-lfp_r00_a03.pdf
