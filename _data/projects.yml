# `sips -s format png --resampleWidth 700 <file>.pdf`, then flattened
# with `magick <file>.png -background white -alpha remove -alpha off
# <file>.png` — sips leaves the page background transparent wherever
# the PDF paints none, which shows the card's manila band through the
# page instead of white paper.

