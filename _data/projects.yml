- title: "1-LFP: Livestock Forage Disaster Program (Amendment 4)"
  category: documents
  type: FSA HANDBOOK
  byline: Amendment 4 · Approved June 15, 2022
  description:
    The 2022 program-year update — clarifies the calculation of the qualifying-drought beginning date, limits covered livestock to weaned animals, adds millet as an eligible small grain, and clarifies beginning dates for newly established or amended grazing periods.
