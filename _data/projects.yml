- title: NAP-190 Normal Grazing Periods
  category: analysis
  type: REANALYSIS
  description:
    "A reproducible recalculation of county Normal Grazing Periods following FSA Notice NAP-190, using NOAA's nClimGrid daily gridded weather dataset and the 1991–2020 climate normals."
  links:
    - title: Documentation
      url: https://sustainable-fsa.com/nclimgrid-normal-grazing-period
  image: /nclimgrid-normal-grazing-period/nclimgrid-normal-grazing-period.png

- title: '"Emergency Relief as Routine": The Evolution of FSA''s Livestock Forage Disaster Program in an Era of Persistent Drought'
  category: analysis
  type: M.S. THESIS
  byline: Shae Leigh Olsen, M.S. · University of Montana, 2025
  description:
    Interviews with 23 FSA staff in nine states examine how the LFP operates on the ground and how staff and producers experience it as a recurring, rather than exceptional, source of operating capital in drought-affected ranching regions.
  links:
    - title: Read on ScholarWorks
      url: https://scholarworks.umt.edu/etd/12523/

- title: "Adaptation and Resilience: How Beginning Farmers Navigate Land and Climate Crises in Western Montana"
  category: analysis
  type: M.S. THESIS
  byline: Kyla Ivana Fugate, M.S. · University of Montana, 2025
  description:
    Examines how new operators in western Montana navigate the intersecting pressures of land access, climate variability, and federal program eligibility.
  links:
    - title: Read on ScholarWorks
      url: https://scholarworks.umt.edu/etd/12508/

- title: "Equity and Social Vulnerability in Drought Planning and Response in the Northern Great Plains"
  category: analysis
  type: M.S. THESIS
  byline: Amishi Singh, M.S. · University of Montana, 2025
  description:
    Extends the project's lens to drought planning and response across the Northern Great Plains, with attention to equity and social vulnerability in how disaster relief reaches communities.
  links:
    - title: Read on ScholarWorks
      url: https://scholarworks.umt.edu/etd/12532

- title: "Water Scarcity in the Bitterroot Valley"
  category: analysis
  type: M.S. THESIS
  byline: August W. Guenthner, M.S. · University of Montana, 2025
  description:
    A regional case study of water-scarcity dynamics in western Montana that complements the LFP work with on-the-ground evidence from a single valley.
  links:
    - title: Read on ScholarWorks
      url: https://scholarworks.umt.edu/etd/12533

