# Each entry renders one card on the Data, Analysis, or Documents page
# (filtered by `category`). The home page no longer shows the full grid;
# see `_layouts/archives.html` for the rendering loop.
#
#   category: data       → appears on /data/
#   category: analysis   → appears on /analysis/
#   category: documents  → appears on /documents/
#
# `updated_method` + `updated_ref` (data cards): renders an italic
# "Data current as of {date}" (or "Data updated {date}") line under the
# card title, resolved client-side by assets/archive-updated.js so the
# date tracks the DATA — not pipeline runs or repo pushes — without a
# site rebuild. Methods:
#   usdm-map        ref is an S3 key prefix up to the filename stem
#                   (e.g. "usdm/data/parquet/USDM_"); shows the map
#                   date of the newest weekly file (USDM maps are
#                   valid the Tuesday before their Thursday release,
#                   and the files are named by map date).
#   github-file     ref is "<repo>/<path>" in the sustainable-fsa org;
#                   shows the date of the last commit that CHANGED that
#                   file (git only records path history on content
#                   change, so routine reruns don't move it).
#   manifest-dates  ref is an S3 key of a manifest.json; shows the
#                   newest USDA-stamped date embedded in the archive's
#                   data-raw/ filenames (YYYYMMDD or MM-DD-YY[YY],
#                   both naming styles FSA uses).
# Archives with no honest automatic signal (static FOIA snapshots,
# manually updated mirrors) use a hand-maintained `byline` instead —
# update it in the same edit as the data refresh.

