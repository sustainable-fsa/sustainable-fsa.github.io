# The six feature cards on the home page (rendered by _includes/feature-card.html,
# looped from _layouts/home.html; 3×2 grid at lg, 2×3 at sm). Each card's subtitle
# is pulled live from the target page's `description:` front matter, so it is not
# duplicated here — except external cards, which carry their own `description`.
#
#   url          target page (must match the page's permalink), or an
#                absolute URL when `external: true`
#   label        card heading
#   cta          call-to-action text under the description
#   theme        accent color — one of: terracotta | sage | ochre
#                (the theme -> Tailwind class mapping lives in feature-card.html
#                 so Tailwind's content scanner still sees the literal class names)
#   icon         the `d` attribute of the card's heroicon <path>
#   external     true → link out verbatim in a new tab (no baseurl prefix)
#   description  subtitle override; required for external cards

