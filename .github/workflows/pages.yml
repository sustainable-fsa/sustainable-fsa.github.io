# ─────────────────────────────────────────────────────────────────────
# Deploy the Sustainable FSA Jekyll site to GitHub Pages.
#
# Replaces "Deploy from a branch" so the build is linted and CSS is
# compiled before publish. Steps:
#   1. Install Node deps, lint source HTML (html-validate), and
#      validate _data/projects.yml (every entry must be categorized).
#   2. Build assets/tailwind.css from src/tailwind.css.
#   3. Install Ruby + github-pages bundle, build _site/.
#   4. Upload the built site and deploy.
#
# To enable: Settings → Pages → Source = "GitHub Actions".
# ─────────────────────────────────────────────────────────────────────
name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Lint source HTML
        run: npm run lint:html

      - name: Validate projects data
        run: npm run lint:data

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Setup Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Build Jekyll site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
